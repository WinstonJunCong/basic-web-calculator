<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <section class="display">
        <p>test</p>
    </section>
    <section class="inputs">
        <div class="top">
            <button>&</button>
            <button>AC</button>
            <button>%</button>
            <button class="operators">/</button>
        </div>
        <div class="inner">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operators">X</button>
        </div>
        <div class="inner">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operators">-</button>
        </div>
        <div class="inner">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operators">+</button>
        </div>
        <div class="inner">
            <button>!</button>
            <button>0</button>
            <button>.</button>
            <button class="operators">=</button>
        </div>
    </section>

</html>
